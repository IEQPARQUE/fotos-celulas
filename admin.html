<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin</title>
</head>

<body style="background:black; color:white; text-align:center;">

<div id="login">
  <h2>🔐 Login</h2>

  <input type="text" id="user" placeholder="ⓘ Usuário"><br><br>
  <input type="password" id="pass" placeholder="🔑 Senha"><br><br>

  <button onclick="entrar()">Entrar</button>
</div>

<div id="painel" style="display:none;">
  <h1>🔐 PAINEL ADMIN</h1>

  <input type="file" id="file"><br><br>
  <button onclick="add()">Adicionar</button>

  <div id="lista"></div>
</div>

<script>
function entrar() {
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  if (u === "admin" && p === "1234") {
    document.getElementById("login").style.display = "none";
    document.getElementById("painel").style.display = "block";
  } else {
    alert("Acesso negado");
  }
}

function add() {
  let file = document.getElementById("file").files[0];

  if (!file) {
    alert("Escolhe uma imagem!");
    return;
  }

  let url = URL.createObjectURL(file);

  let img = document.createElement("img");
  img.src = url;
  img.style.width = "200px";

  let btn = document.createElement("button");
  btn.innerText = "Excluir";

  btn.onclick = function() {
    img.remove();
    btn.remove();
  };

  document.getElementById("lista").appendChild(img);
  document.getElementById("lista").appendChild(btn);
}
</script>

</body>
</html>
